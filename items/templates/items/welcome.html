<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>FindIt - Welcome</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    .hero-section {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      height: 100vh;                /* Full viewport height */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;                   /* Remove padding for perfect centering */
    }
    .feature-card {
      transition: transform 0.3s ease;
      border: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .feature-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    }
    .btn-custom {
      padding: 12px 30px;
      border-radius: 25px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn-primary-custom {
      background: linear-gradient(45deg, #667eea, #764ba2);
      border: none;
    }
    .btn-outline-custom {
      border: 2px solid #667eea;
      color: #667eea;
    }
    .btn-outline-custom:hover {
      background: #667eea;
      color: white;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="{% url 'items:welcome' %}">
        <i class="fas fa-search"></i> FindIt
      </a>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero-section">
    <div class="container text-center">
      <h1 class="display-4 mb-4">College Lost & Found</h1>
      <p class="lead mb-5">Find your lost items on campus</p>
      <div class="d-flex gap-3 justify-content-center">
        <a href="{% url 'items:login' %}" class="btn btn-light btn-custom">
          <i class="fas fa-sign-in-alt"></i> Login
        </a>
        <a href="{% url 'items:register' %}" class="btn btn-outline-light btn-custom">
          <i class="fas fa-user-plus"></i> Register
        </a>
      </div>
    </div>
  </section>

  

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
