<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login - FindIt</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
    }
    .login-card {
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      border: none;
    }
    .btn-custom {
      background: linear-gradient(45deg, #667eea, #764ba2);
      border: none;
      border-radius: 25px;
      padding: 12px 30px;
      font-weight: 600;
    }
    .form-control {
      border-radius: 10px;
      border: 2px solid #e9ecef;
      padding: 12px 15px;
    }
    .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }
    .demo-credentials {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        <div class="card login-card">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <i class="fas fa-search fa-3x text-primary mb-3"></i>
              <h3 class="card-title">Welcome Back</h3>
              <p class="text-muted">Sign in to your FindIt account</p>
            </div>

            {% if messages %}
              {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                  {{ message }}
                  <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
              {% endfor %}
            {% endif %}

            <form method="post" novalidate>
              {% csrf_token %}
              <div class="mb-3">
                <label for="username" class="form-label">
                  <i class="fas fa-user"></i> Username
                </label>
                <input type="text" class="form-control" id="username" name="username" required>
                <div class="invalid-feedback">Username is required.</div>
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">
                  <i class="fas fa-lock"></i> Password
                </label>
                <input type="password" class="form-control" id="password" name="password" required>
                <div class="invalid-feedback">Password is required.</div>
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-custom">
                  <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
              </div>
            </form>

            <hr class="my-4">
            
            <div class="text-center">
              <p class="mb-0">Don't have an account?</p>
              <a href="{% url 'items:register' %}" class="btn btn-outline-primary btn-sm mt-2">
                <i class="fas fa-user-plus"></i> Create Account
              </a>
            </div>

            <div class="text-center mt-3">
              <a href="{% url 'items:welcome' %}" class="text-muted">
                <i class="fas fa-arrow-left"></i> Back to Welcome
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.querySelector('form').addEventListener('submit', function(e) {
        let form = e.target;
        if (!form.checkValidity()) {
            e.preventDefault();
            form.classList.add('was-validated');
        }
    });
  </script>
</body>
</html>
