{% extends "items/base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
        <h4 class="mb-0">
          <i class="fas fa-edit"></i> Edit Item
        </h4>
        <a href="{% url 'items:detail' item.id %}" class="btn btn-sm btn-light"><i class="fas fa-arrow-left"></i> Back</a>
      </div>
      <div class="card-body">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label"><i class="fas fa-heading"></i> Title</label>
                <input type="text" class="form-control" name="title" value="{{ item.title }}" required>
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label"><i class="fas fa-tag"></i> Type</label>
                <select class="form-select" name="type" required>
                  <option value="Lost" {% if item.item_type == 'Lost' %}selected{% endif %}>Lost Item</option>
                  <option value="Found" {% if item.item_type == 'Found' %}selected{% endif %}>Found Item</option>
                </select>
              </div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label"><i class="fas fa-align-left"></i> Description</label>
            <textarea class="form-control" name="description" rows="4" required>{{ item.description }}</textarea>
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label"><i class="fas fa-th-large"></i> Category</label>
                <select class="form-select" name="category" required>
                  {% for c in 'Electronics,Accessories,Keys,Documents,Bags,Clothing,Jewelry,Books,Other'.split(',') %}
                  <option value="{{ c }}" {% if item.category == c %}selected{% endif %}>{{ c }}</option>
                  {% endfor %}
                </select>
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label"><i class="fas fa-calendar"></i> Date</label>
                <input type="date" class="form-control" name="date" value="{{ item.date_lost_found|date:'Y-m-d' }}" required>
              </div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label"><i class="fas fa-map-marker-alt"></i> Location</label>
            <input type="text" class="form-control" name="location" value="{{ item.location }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label"><i class="fas fa-image"></i> Replace Image (Optional)</label>
            <input type="file" class="form-control" name="image" accept="image/*">
            {% if item.image %}
            <div class="mt-2 small text-muted">Current image:</div>
            <img src="{{ item.image }}" alt="{{ item.title }}" class="img-fluid rounded" style="max-height:180px;">
            {% endif %}
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
            <a href="{% url 'items:detail' item.id %}" class="btn btn-outline-secondary"><i class="fas fa-times"></i> Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
