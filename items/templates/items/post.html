{% extends "items/base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0">
          <i class="fas fa-plus-circle"></i> Post Lost/Found Item
        </h4>
      </div>
      <div class="card-body">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label">
                  <i class="fas fa-heading"></i> Title
                </label>
                <input type="text" class="form-control" name="title" placeholder="Lost Wallet / Found Phone" required>
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label">
                  <i class="fas fa-tag"></i> Type
                </label>
                <select class="form-select" name="type" required>
                  <option value="">Select Type</option>
                  <option value="Lost">Lost Item</option>
                  <option value="Found">Found Item</option>
                </select>
              </div>
            </div>
          </div>
          
          <div class="mb-3">
            <label class="form-label">
              <i class="fas fa-align-left"></i> Description
            </label>
            <textarea class="form-control" name="description" rows="4" placeholder="Provide a detailed description of the item..." required></textarea>
          </div>
          
          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label">
                  <i class="fas fa-th-large"></i> Category
                </label>
                <select class="form-select" name="category" required>
                  <option value="">Select Category</option>
                  <option value="Electronics">Electronics</option>
                  <option value="Accessories">Accessories</option>
                  <option value="Keys">Keys</option>
                  <option value="Documents">Documents</option>
                  <option value="Bags">Bags</option>
                  <option value="Clothing">Clothing</option>
                  <option value="Jewelry">Jewelry</option>
                  <option value="Books">Books</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label">
                  <i class="fas fa-calendar"></i> Date
                </label>
                <input type="date" class="form-control" name="date" required>
              </div>
            </div>
          </div>
          
          <div class="mb-3">
            <label class="form-label">
              <i class="fas fa-map-marker-alt"></i> Location
            </label>
            <input type="text" class="form-control" name="location" placeholder="Where did you lose/find this item?" required>
          </div>
          
          <div class="mb-3">
            <div class="alert alert-info">
              <i class="fas fa-info-circle"></i>
              <strong>Contact Information:</strong> Your registered email ({{ user.email }}) will be used as the contact information for this item.
            </div>
          </div>
          
          <div class="mb-3">
            <label class="form-label">
              <i class="fas fa-image"></i> Upload Image (Optional)
            </label>
            <input type="file" class="form-control" name="image" accept="image/*">
            <div class="form-text">Upload a photo to help identify the item better</div>
          </div>
          
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-paper-plane"></i> Post Item
            </button>
            <a href="{% url 'items:dashboard' %}" class="btn btn-outline-secondary">
              <i class="fas fa-arrow-left"></i> Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
